version: "3.9"

services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-https://velamap.com}
    ports:
      - "8201:8000"

  # pathway (Go) — 暂时禁用，内存占用过高
  # pathway:
  #   image: ghcr.io/${GITHUB_REPOSITORY}/pathway:latest
  #   restart: unless-stopped
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #     ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-https://velamap.com}
  #     PORT: "8080"
  #   ports:
  #     - "8202:8080"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "8200:3000"
    depends_on:
      - api
